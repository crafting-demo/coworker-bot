worker_processes 1;
load_module modules/ndk_http_module.so;
load_module modules/ngx_http_lua_module.so;

error_log /tmp/nginx-error.log;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    lua_shared_dict github_token 1m;

    server {
        listen 8082;

        location /mcp {
            access_by_lua_block {
                local cache = ngx.shared.github_token
                local token = cache:get("token")

                if not token or #token == 0 then
                    local repo = os.getenv("GITHUB_REPO")
                    local input = "protocol=https\nhost=github.com\npath=" .. repo .. "\n"
                    local tmpfile = os.tmpname()
                    local fh = io.open(tmpfile, "w")
                    fh:write(input)
                    fh:close()
                    local handle = io.popen("/opt/sandboxd/sbin/wsenv git-credentials get < " .. tmpfile)
                    local stdout = handle:read("*a")
                    local ok = handle:close()
                    os.remove(tmpfile)
                    local stderr = nil

                    if not ok then
                        ngx.log(ngx.ERR, "git-credentials get failed: ", stderr or "")
                        ngx.status = 502
                        ngx.say("failed to obtain GitHub token")
                        ngx.exit(502)
                    end

                    for line in stdout:gmatch("[^\n]+") do
                        local pw = line:match("^password=(.+)")
                        if pw then token = pw; break end
                    end

                    if not token or #token == 0 then
                        ngx.log(ngx.ERR, "git-credentials response contained no password field")
                        ngx.status = 502
                        ngx.say("failed to obtain GitHub token")
                        ngx.exit(502)
                    end

                    cache:set("token", token, 3300)
                end

                ngx.req.set_header("Authorization", "Bearer " .. token)
            }

            proxy_pass http://github-mcp:8082/mcp;
            proxy_set_header Host github-mcp;
            proxy_http_version 1.1;
            proxy_buffering off;
        }
    }
}
