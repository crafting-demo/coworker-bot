env GITHUB_ORG;
worker_processes 1;
load_module modules/ndk_http_module.so;
load_module modules/ngx_http_lua_module.so;

error_log /tmp/nginx-error.log;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    access_log /tmp/nginx-access.log;

    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    lua_shared_dict github_token 1m;

    server {
        listen 8082;

        location /mcp {
            access_by_lua_block {
                local function fail(msg)
                    ngx.log(ngx.ERR, msg)
                    ngx.status = 502
                    ngx.say("failed to obtain GitHub token")
                    ngx.exit(502)
                end

                local cache = ngx.shared.github_token
                local token = cache:get("token")

                if not token or #token == 0 then
                    local repo = os.getenv("GITHUB_ORG") .. "/coworker-bot"
                    local input = "protocol=https\nhost=github.com\npath=" .. repo .. "\n"
                    local tmpfile = os.tmpname()
                    local fh = io.open(tmpfile, "w")
                    fh:write(input)
                    fh:close()
                    local handle = io.popen("/opt/sandboxd/sbin/wsenv git-credentials get < " .. tmpfile)
                    local stdout = handle:read("*a")
                    handle:close()
                    os.remove(tmpfile)

                    if not stdout or #stdout == 0 then
                        fail("git-credentials get failed: empty output")
                    end

                    for line in stdout:gmatch("[^\n]+") do
                        local pw = line:match("^password=(.+)")
                        if pw then token = pw; break end
                    end

                    if not token or #token == 0 then
                        fail("git-credentials response contained no password field")
                    end

                    cache:set("token", token, 3300)
                end

                ngx.req.set_header("Authorization", "Bearer " .. token)
            }

            proxy_pass http://github-mcp:8082/mcp;
            proxy_set_header Host github-mcp;
            proxy_http_version 1.1;
            proxy_buffering off;
        }
    }
    server {
        listen 8083;
        location /mcp {
            proxy_set_header Authorization "Bearer ${JIRA_API_TOKEN}";
            proxy_set_header Host mcp.atlassian.com;
            proxy_pass https://mcp.atlassian.com/v1/mcp;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_ssl_server_name on;
        }
    }
    server {
        listen 8080;
        location /mcp {
            proxy_set_header Authorization "Bearer ${LINEAR_API_TOKEN}";
            proxy_set_header Host mcp.linear.app;
            proxy_pass https://mcp.linear.app/mcp;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_ssl_server_name on;
        }
    }
}
