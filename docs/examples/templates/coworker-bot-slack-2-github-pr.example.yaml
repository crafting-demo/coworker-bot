env:
  - GITHUB_ORG=org
  - GITHUB_WEBHOOK_SECRET=${secret:github-webhook-secret}
  - GITHUB_BOT_USERNAME=your-bot-github-username
  - GITHUB_REPOSITORIES=owner/repo
  - SLACK_BOT_TOKEN=${secret:slack-bot-token}
  - SLACK_SIGNING_SECRET=${secret:slack-signing-secret}
  - SLACK_MCP_XOXB_TOKEN=${secret:slack-bot-token}

endpoints:
  - name: webhook
    http:
      routes:
        - backend:
            target: dev
            port: webhook
          path_prefix: /
      auth_proxy:
        disabled: true
  - name: github-mcp
    type: INTERNAL
    http:
      routes:
        - backend:
            target: dev
            port: github
          path_prefix: /
      auth_proxy:
        disabled: true
      path: /mcp
  - name: slack-mcp
    type: INTERNAL
    http:
      routes:
        - backend:
            target: slack-mcp
            port: slack
          path_prefix: /
      auth_proxy:
        disabled: true
      path: /mcp

workspaces:
  - name: dev
    ports:
      - name: webhook
        port: 3000
        protocol: HTTP/TCP
      - name: github
        port: 8082
        protocol: HTTP/TCP
    checkouts:
      - path: coworker-bot
        repo:
          github:
            org: org
            repo: coworker-bot
        manifest:
          overlays:
            - file: .sandbox/setup.yaml
            - file: .sandbox/proxy.yaml

    system:
      files:
        - path: ~/coworker-bot/config/watcher.yaml
          mode: "0644"
          overwrite: true
          content: |
            server:
              host: 0.0.0.0
              port: 3000
            commandExecutor:
              enabled: true
              command: "cs llm session run --approval=auto --name=$EVENT_SHORT_ID --task"
              promptTemplateFile: ./config/event-prompt.hbs
              useStdin: true
              followUp: true
            deduplication:
              enabled: true
              commentTemplate: "Agent is working on {id}"
            providers:
              github:
                enabled: true
              slack:
                enabled: true
    restriction:
      life_time: ALWAYS

containers:
  - name: github-mcp
    image: ghcr.io/github/github-mcp-server
    args:
      - http
    env:
      - GITHUB_TOOLSETS=repos,issues,pull_requests
    ports:
      - name: github
        port: 8082
        protocol: HTTP/TCP
  - name: slack-mcp
    image: ghcr.io/korotovsky/slack-mcp-server:latest
    entrypoint:
      - mcp-server
    args:
      - --transport
      - http
    env:
      - SLACK_MCP_PORT=8081
      - SLACK_MCP_HOST=0.0.0.0
    ports:
      - name: slack
        port: 8081
        protocol: HTTP/TCP

customizations:
  - mcp_server:
      endpoint: github-mcp
  - mcp_server:
      endpoint: slack-mcp
